# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - adp-to-azuread

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'release.zip'
  AZURE_FUNCTIONAPP_PRODUCTION_NAME: 'adp-to-azuread'
  AZURE_FUNCTIONAPP_STAGING_NAME: ${{ vars.AZURE_FUNCTIONAPP_STAGING_NAME }}
  AZURE_FUNCTIONAPP_RESOURCE_GROUP: 'rg-vnet-scus-01'
  PYTHON_VERSION: '3.10' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff mypy types-requests

      - name: Run verification suite
        run: |
          pytest -q
          python - <<'PY'
          import pathlib
          import py_compile
          files = [pathlib.Path("function_app.py")]
          files.extend(sorted(pathlib.Path("app").glob("*.py")))
          files.extend(sorted(pathlib.Path("tests").glob("*.py")))
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(files)} Python files")
          PY
          ruff check app tests function_app.py
          mypy app

      - name: Build deployment package
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          include_files = [
              Path("function_app.py"),
              Path("host.json"),
              Path("requirements.txt"),
          ]

          with ZipFile("release.zip", "w", compression=ZIP_DEFLATED) as archive:
              for path in include_files:
                  archive.write(path, path.as_posix())
              for path in Path("app").rglob("*"):
                  if path.is_dir() or "__pycache__" in path.parts or path.suffix in {".pyc", ".pyo"}:
                      continue
                  archive.write(path, path.as_posix())
          PY

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D05BA0A5C53040BC90861619C63E0B7A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D194AF7E0D4F4DF6A47E424D514F5B55 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B667FEA9683841769EBD122F8698FE3F }}

      - name: Deploy to staging Azure Functions
        if: ${{ env.AZURE_FUNCTIONAPP_STAGING_NAME != '' }}
        uses: Azure/functions-action@v1
        id: deploy-to-staging
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_STAGING_NAME }}
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          remote-build: true

      - name: Smoke check staging function indexing
        if: ${{ env.AZURE_FUNCTIONAPP_STAGING_NAME != '' }}
        env:
          FUNCTIONAPP_NAME: ${{ env.AZURE_FUNCTIONAPP_STAGING_NAME }}
          FUNCTIONAPP_RESOURCE_GROUP: ${{ env.AZURE_FUNCTIONAPP_RESOURCE_GROUP }}
        run: python scripts/assert_function_indexing.py

      - name: Deploy to production Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_PRODUCTION_NAME }}
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          remote-build: true

      - name: Smoke check production function indexing
        env:
          FUNCTIONAPP_NAME: ${{ env.AZURE_FUNCTIONAPP_PRODUCTION_NAME }}
          FUNCTIONAPP_RESOURCE_GROUP: ${{ env.AZURE_FUNCTIONAPP_RESOURCE_GROUP }}
        run: python scripts/assert_function_indexing.py
          
