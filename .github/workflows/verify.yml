name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy types-requests

      - name: Run unit tests
        run: pytest -q

      - name: Run py_compile smoke check
        run: |
          python - <<'PY'
          import pathlib
          import py_compile
          files = [pathlib.Path("function_app.py")]
          files.extend(sorted(pathlib.Path("app").glob("*.py")))
          files.extend(sorted(pathlib.Path("tests").glob("*.py")))
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(files)} Python files")
          PY

      - name: Run Ruff
        run: ruff check app tests function_app.py

      - name: Run mypy
        run: mypy app

