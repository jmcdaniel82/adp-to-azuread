[tool.ruff]
target-version = "py310"
line-length = 110

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.10"
files = ["app"]
check_untyped_defs = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
filterwarnings = [
    "ignore:tagMap is deprecated\\. Please use TAG_MAP instead\\.:DeprecationWarning:pyasn1\\.codec\\.ber\\.encoder",
    "ignore:typeMap is deprecated\\. Please use TYPE_MAP instead\\.:DeprecationWarning:pyasn1\\.codec\\.ber\\.encoder",
]

[[tool.mypy.overrides]]
module = ["ldap3", "ldap3.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["azure", "azure.*", "azure.functions", "azure.functions.*"]
ignore_missing_imports = true
